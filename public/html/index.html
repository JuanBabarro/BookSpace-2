<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Biblioteca Digital</title>
    <!-- Prevent Cache -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Iconify -->
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <!-- CSS -->
    <script src="../js/theme.js"></script>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/login.css">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f0b09">
    <link rel="apple-touch-icon" href="/images/b5115b72-8826-4cb9-ac17-2b6836d731e0.png">
</head>

<body class="auth-page">
    <div class="login-container">
        <div class="glass-card login-card">
            <button type="button" class="theme-toggle-btn auth-theme-toggle" title="Alternar tema">
                <span class="iconify" data-icon="mdi:weather-sunny"></span>
            </button>
            <div class="logo-header">
                <div class="logo-title">
                    <span class="iconify" data-icon="game-icons:book-cover"></span>
                    <h1>BookSpace</h1>
                </div>
            </div>

            <form id="formularioLogin">
                <div class="input-group">
                    <label for="correo">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <span class="iconify" data-icon="mdi:email-outline"></span>
                        <input type="email" id="correo" placeholder="tu@ejemplo.com" required>
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 2rem;">
                    <label for="contrasena">Contraseña</label>
                    <div class="input-wrapper">
                        <span class="iconify" data-icon="mdi:lock-outline"></span>
                        <input type="password" id="contrasena" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="botonLogin">
                    <span class="btn-text">Iniciar Sesión</span>
                    <span class="iconify" data-icon="mdi:arrow-right"></span>
                </button>

                <div id="textoResultadoLogin" style="margin-top: 1.5rem; text-align: center; display: none;"></div>
            </form>

            <div class="footer-links">
                <p style="color: var(--text-muted);">¿Aún no tienes una cuenta? <a href="/registrar">Regístrate gratis</a></p>
            </div>
        </div>
    </div>

    <script src="../js/login.js?v=2"></script>

    <!-- PWA Service Worker Registration -->
    <script src="../js/pwa.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio | Biblioteca Digital</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap"
        rel="stylesheet">
    <!-- Iconify -->
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <!-- CSS (Rutas Absolutas para evitar errores) -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/modal.css">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f0b09">
    <link rel="apple-touch-icon" href="/images/b5115b72-8826-4cb9-ac17-2b6836d731e0.png">
</head>

<body class="dashboard-layout">
    <nav class="navbar">
        <a href="/inicio" class="logo">
            <span class="iconify" data-icon="game-icons:book-cover"></span>
            BookSpace
        </a>
        <div class="nav-actions">
            <a href="/mi-lista" class="nav-link" title="mi Lista"><span class="iconify"
                    data-icon="mdi:bookmark-multiple-outline"></span></a>
            <a href="#" class="nav-link" title="notificaciones"><span class="iconify"
                    data-icon="mdi:bell-outline"></span></a>
            <div class="nav-dropdown">
                <a href="#" class="nav-link" id="configBtn" title="configuracion">
                    <span class="iconify" data-icon="mdi:cog-outline"></span>
                </a>
                <div class="dropdown-menu" id="configDropdown">
                    <a href="/perfil" class="dropdown-item">
                        <span class="iconify" data-icon="mdi:account-circle-outline"></span>
                        Mi Perfil
                    </a>
                    <a href="/logout" class="dropdown-item logout">
                        <span class="iconify" data-icon="mdi:logout"></span>
                        Cerrar Sesión
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <header class="hero-section">
            <div style="max-width: 800px; width: 100%;">
                <h1>BookSpace</h1>
                <p class="hero-description">Tu biblioteca digital personal, donde las historias cobran vida en un
                    entorno clásico y atemporal.</p>
                <div class="search-box-container">
                    <div class="rustic-search-input">
                        <span class="iconify" data-icon="mdi:magnify"></span>
                        <input type="text" id="bookSearch" placeholder="Busca en los archivos de BookSpace...">
                    </div>
                </div>
            </div>
        </header>

        <div class="books-grid" id="booksGrid">
            <!-- Books will be rendered here -->
        </div>
    </main>

    <!-- Contenedor para el modal cargado dinámicamente -->
    <div id="modalContainer"></div>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <span class="iconify" data-icon="game-icons:book-cover"></span>
                BookSpace
            </div>
            <p class="copyright">&copy; 2026 Biblioteca Digital. Elegancia y minimismo literario.</p>
            <div class="footer-social">
                <a href="#" class="social-link"><span class="iconify" data-icon="mdi:instagram"></span></a>
                <a href="#" class="social-link"><span class="iconify" data-icon="mdi:twitter"></span></a>
                <a href="#" class="social-link"><span class="iconify" data-icon="mdi:facebook"></span></a>
            </div>
        </div>
    </footer>

    <script src="/js/dashboard.js"></script>

    <!-- PWA Service Worker Registration -->
    <script src="../js/pwa.js"></script>
</body>

</html>

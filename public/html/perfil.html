<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Biblioteca Digital</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;700;800&family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap"
        rel="stylesheet">
    <!-- Iconify -->
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/perfil.css">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f0b09">
    <link rel="apple-touch-icon" href="/images/b5115b72-8826-4cb9-ac17-2b6836d731e0.png">
</head>

<body class="dashboard-layout">
    <nav class="navbar">
        <a href="/inicio" class="logo">
            <span class="iconify" data-icon="game-icons:book-cover"></span>
            BookSpace
        </a>
        <div class="nav-actions">
            <a href="/mi-lista" class="nav-link" title="mi Lista"><span class="iconify"
                    data-icon="mdi:bookmark-multiple-outline"></span></a>
            <a href="#" class="nav-link" title="notificaciones"><span class="iconify"
                    data-icon="mdi:bell-outline"></span></a>
            <div class="nav-dropdown">
                <a href="#" class="nav-link active" id="configBtn" title="configuracion">
                    <span class="iconify" data-icon="mdi:cog-outline"></span>
                </a>
                <div class="dropdown-menu" id="configDropdown">
                    <a href="/perfil" class="dropdown-item">
                        <span class="iconify" data-icon="mdi:account-circle-outline"></span>
                        Mi Perfil
                    </a>
                    <a href="/logout" class="dropdown-item logout">
                        <span class="iconify" data-icon="mdi:logout"></span>
                        Cerrar Sesión
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="profile-container">
        <!-- Sidebar: Header & Avatar Selector -->
        <aside class="profile-sidebar">
            <div class="glass-card profile-header-card">
                <div class="current-avatar-container">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23c2a170'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>" alt="Avatar Actual"
                        class="current-avatar" id="mainAvatar">
                </div>
                <h2>Juan Carlos</h2>
                <p>Amante de la literatura clásica</p>
            </div>

            <div class="glass-card avatar-selector-section">
                <button id="toggleAvatarBtn" class="avatar-toggle-btn">
                    <span>Cambiar Avatar</span>
                    <span class="iconify" data-icon="mdi:chevron-down"></span>
                </button>
                <div class="avatar-drawer" id="avatarDrawer">
                    <div class="avatar-grid">
                        <div class="avatar-option" data-avatar="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23c2a170'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>">
                            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23c2a170'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>" alt="Por Defecto">
                        </div>
                        <div class="avatar-option" data-avatar="/images/image/foto1.png">
                            <img src="/images/image/foto1.png" alt="Avatar 1">
                        </div>
                        <div class="avatar-option" data-avatar="/images/image/foto2.png">
                            <img src="/images/image/foto2.png" alt="Avatar 2">
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main: Form & Reviews -->
        <div class="profile-main-content">
            <div class="glass-card profile-form-card" style="margin-bottom: 3rem;">
                <h2>
                    <span class="iconify" data-icon="mdi:account-edit-outline"></span>
                    Editar Perfil
                </h2>
                <form id="formularioPerfil">
                    <div class="input-group">
                        <label for="nombre_completo">Nombre Completo</label>
                        <div class="input-wrapper">
                            <span class="iconify" data-icon="mdi:account"></span>
                            <input type="text" id="nombre_completo" value="Juan Carlos" placeholder="Tu nombre">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="correo">Correo Electrónico</label>
                        <div class="input-wrapper">
                            <span class="iconify" data-icon="mdi:email"></span>
                            <input type="email" id="correo" value="juan.carlos@example.com" placeholder="tu@email.com">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="input-group">
                            <label for="contrasena">Nueva Contraseña</label>
                            <div class="input-wrapper">
                                <span class="iconify" data-icon="mdi:lock"></span>
                                <input type="password" id="contrasena" placeholder="••••••••">
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="confirmar_contrasena">Confirmar Contraseña</label>
                            <div class="input-wrapper">
                                <span class="iconify" data-icon="mdi:lock-check"></span>
                                <input type="password" id="confirmar_contrasena" placeholder="••••••••">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Guardar Cambios</button>
                </form>
            </div>

            <section class="reviews-section">
                <div class="section-header">
                    <h2>Mis Reseñas</h2>
                    <span class="status-badge progress"
                        style="background: rgba(194, 161, 112, 0.1); color: var(--primary);">3 Reseñas Totales</span>
                </div>

                <div class="reviews-grid" id="reviewsGrid">
                    <p style="color: var(--reader-text-muted); text-align: center; width: 100%; grid-column: 1 / -1; padding: 2rem;">Cargando reseñas...</p>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <span class="iconify" data-icon="game-icons:book-cover"></span>
                BookSpace
            </div>
            <p class="copyright">&copy; 2026 Biblioteca Digital. Elegancia y minimismo literario.</p>
            <div class="footer-social">
                <a href="#" class="social-link"><span class="iconify" data-icon="mdi:instagram"></span></a>
                <a href="#" class="social-link"><span class="iconify" data-icon="mdi:twitter"></span></a>
                <a href="#" class="social-link"><span class="iconify" data-icon="mdi:facebook"></span></a>
            </div>
        </div>
    </footer>

    <script src="/js/dashboard.js"></script>
    <script src="/js/perfil.js"></script>

    <!-- PWA Service Worker Registration -->
    <script src="../js/pwa.js"></script>
</body>

</html>
